<div class="max-w-2xl mx-auto px-4 py-8">
  <h2 class="text-2xl text-center font-bold text-gray-800 mb-6">Add New Student</h2>

  <div *ngIf="successMessage" class="bg-green-100 text-green-700 px-4 py-3 rounded-lg mb-4 font-medium">
    {{ successMessage }}
  </div>

  <form (ngSubmit)="onSubmit()" class="bg-white rounded-2xl shadow-md p-6 space-y-4">

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">First Name *</label>
        <input type="text" [(ngModel)]="student.firstName" name="firstName" placeholder="Salma"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Last Name *</label>
        <input type="text" [(ngModel)]="student.lastName" name="lastName" placeholder="Assem"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Age *</label>
        <input type="number" [(ngModel)]="student.age" name="age" placeholder="21" min="16" max="60"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Gender</label>
        <select [(ngModel)]="student.gender" name="gender"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400">
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">Email *</label>
      <input type="email" [(ngModel)]="student.email" name="email" placeholder="ali@email.com"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">Phone</label>
      <input type="text" [(ngModel)]="student.phone" name="phone" placeholder="01000000000"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">Address</label>
      <input type="text" [(ngModel)]="student.address" name="address" placeholder="12 Main Street"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">City</label>
        <input type="text" [(ngModel)]="student.city" name="city" placeholder="Cairo"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Country</label>
        <input type="text" [(ngModel)]="student.country" name="country" placeholder="Egypt"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Department *</label>
        <input type="text" [(ngModel)]="student.department" name="department" placeholder="Computer Science"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Level (Year)</label>
        <input type="number" [(ngModel)]="student.level" name="level" placeholder="e.g. 2" min="1" max="6"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">GPA *</label>
        <input type="number" [(ngModel)]="student.GPA" name="GPA" placeholder="e.g. 3.5" min="0" max="4" step="0.01"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-600 mb-1">Enrollment Date</label>
        <input type="date" [(ngModel)]="student.enrollmentDate" name="enrollmentDate"
          class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-400" />
      </div>
    </div>

    <div class="flex items-center gap-2">
      <input type="checkbox" id="isActive" [(ngModel)]="student.isActive" name="isActive" class="w-4 h-4 accent-blue-600" />
      <label for="isActive" class="text-sm text-gray-600">Is Active Student</label>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit"
        class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition font-medium">
        ✅ Add Student
      </button>
      <a routerLink="/students"
        class="bg-gray-100 text-gray-700 px-6 py-2 rounded-lg hover:bg-gray-200 transition font-medium">
        Cancel
      </a>
    </div>

  </form>
</div>
